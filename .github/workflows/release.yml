name: Release

# Trigger: push a tag like `v0.2.0` → builds required-platform binaries in
# parallel, attaches them to the GitHub Release by that tag. The Operium
# Orchestra VS Code extension polls /releases/latest and pulls assets by
# exact name.
#
# Required (this workflow, must both succeed or no release):
#   orchestra-runtime-darwin-arm64    Apple Silicon, Metal + Accelerate
#   orchestra-runtime-linux-x64       Linux glibc, CPU only
#   + their orchestra-worker-* twins for subprocess mode
#
# Best-effort (separate workflow — see release-extras.yml): Intel Mac, Win32.

on:
  push:
    tags:
      - "v*"
  # Allow manual dispatch for dry-runs without tagging.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.2.0). Leave blank for a dry-run artifact."
        required: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # needed to create/update a Release and upload assets

jobs:
  # Required platforms: release WILL NOT publish unless both succeed.
  # Why only two: Intel macOS runner availability on GitHub is terrible (runs
  # sit queued for hours; release job can't proceed until they finish even
  # with continue-on-error because `needs: build` waits for completion, not
  # success). Windows+MinGW+llama.cpp is historically flaky. Both those
  # platforms live in `release-extras.yml` and attach to the same release
  # after it's cut — if they fail, the release still ships with core assets.
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-arm64
            runner: macos-14
            make_target: build-metal
            artifact: orchestra-runtime-darwin-arm64
            worker_artifact: orchestra-worker-darwin-arm64
          - name: linux-x64
            runner: ubuntu-22.04
            make_target: build-cpu
            artifact: orchestra-runtime-linux-x64
            worker_artifact: orchestra-worker-linux-x64

    steps:
      - name: Checkout (with llama.cpp submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # libcurl is only strictly needed if LLAMA_CURL=ON in cmake; our
          # Makefile sets it OFF, but install anyway so local `make` from
          # the same VM works for contributors who flip the flag.
          sudo apt-get install -y cmake build-essential libcurl4-openssl-dev

      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        run: |
          # cmake + clang already preinstalled on GitHub runners;
          # this is a no-op guard so the step is explicit.
          cmake --version

      - name: Derive version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: make ${{ matrix.make_target }} VERSION=${{ steps.ver.outputs.version }}

      - name: Rename binaries for release
        run: |
          cp bin/orchestra-runtime bin/${{ matrix.artifact }}
          cp bin/orchestra-worker  bin/${{ matrix.worker_artifact }}

      # We upload both binaries under a single artifact to keep the download
      # step on the release side simple. Names still end up distinct on the
      # GitHub Release page (orchestra-runtime-*, orchestra-worker-*).
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            bin/${{ matrix.artifact }}
            bin/${{ matrix.worker_artifact }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten paths
        run: |
          mkdir -p release-assets
          # Each matrix entry uploads under a folder per platform; flatten
          # so release-assets/ contains exactly the files we want as assets.
          find artifacts -type f -maxdepth 2 -exec cp {} release-assets/ \;
          ls -la release-assets/
          # Fail explicitly if nothing made it here — otherwise softprops
          # would publish an empty release.
          if [ -z "$(ls -A release-assets)" ]; then
            echo "::error::No build artifacts produced — aborting release."
            exit 1
          fi

      - name: Compute SHA256 checksums
        run: |
          cd release-assets
          for f in *; do
            shasum -a 256 "$f" >> SHA256SUMS
          done
          cat SHA256SUMS

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
